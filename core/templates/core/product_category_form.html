{% extends 'core/base.html' %}

{% block content %}
<div class="content">
    <div class="content-header">
        <h2>{{ title }}</h2>
    </div>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            {{ form.name.label_tag }}
            {{ form.name }}
        </div>
        <div class="form-group">
            {{ form.description.label_tag }}
            {{ form.description }}
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{% url 'product_category_list' %}" class="btn btn-secondary">取消</a>
    </form>
</div>
{% endblock %}
