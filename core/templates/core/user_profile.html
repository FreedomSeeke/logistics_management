{% extends 'core/base.html' %}

{% block content %}
<div class="content">
    <div class="content-header">
        <h2>个人资料管理</h2>
    </div>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" value="{{ user.username }}" disabled>
        </div>
        <div class="form-group">
            <label for="first_name">姓名</label>
            <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}">
        </div>
        <div class="form-group">
            <label for="last_name">姓氏</label>
            <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}">
        </div>
        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" value="{{ user.email }}">
        </div>
        <div class="form-group">
            <label for="date_joined">注册时间</label>
            <input type="text" id="date_joined" name="date_joined" value="{{ user.date_joined|date:'Y-m-d H:i' }}" disabled>
        </div>
        <button type="submit" class="btn btn-primary">保存资料</button>
        <a href="{% url 'change_password' %}" class="btn btn-secondary">修改密码</a>
        <a href="{% url 'index' %}" class="btn btn-secondary">返回主页</a>
    </form>
</div>
{% endblock %}
